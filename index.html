<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>PlayPocket Web Player</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" type="image/png" href="icon.png">
</head>
<body>
  <div id="app">
    <aside class="sidebar" role="complementary" aria-label="サイドバー">
      <div class="brand">PlayPocket Web Player</div>

      <div class="playlist-controls">
        <input id="newPlaylistName" placeholder="新しいプレイリスト名" aria-label="新しいプレイリスト名" />
        <button id="createPlaylistBtn" class="btn">作成</button>
      </div>

      <ul id="playlists" class="playlists" aria-label="プレイリスト一覧"></ul>

      <div class="file-controls" aria-label="ファイル操作">
        <input id="fileInput" type="file" accept="video/*" multiple />
        <label for="fileInput" class="btn">ファイルを追加</label>
        <div id="dropZone" class="drop-zone" aria-hidden="false">ここにドラッグ＆ドロップ</div>

        <div class="export-row">
          <button id="exportMetaBtn" class="btn small">プレイリストをエクスポート</button>
          <button id="exportWithBlobsBtn" class="btn small">プレイリストをエクスポート（埋め込み）</button>
        </div>

        <input id="importFile" type="file" accept=".json" aria-label="プレイリストをインポート" />
      </div>
    </aside>

    <main class="main" role="main">
      <header class="topbar" role="banner">
        <button id="menuToggle" class="menu-btn">☰</button>
        <div class="search">PlayPocket Web Player by TakkunMC</div>

        <div class="modes" role="tablist" aria-label="再生モード">
          <button id="orderBtn" class="mode active" role="tab" aria-selected="true">追加順</button>
          <button id="shuffleBtn" class="mode" role="tab" aria-selected="false">シャッフル</button>
          <button id="randomBtn" class="mode" aria-selected="false">ランダム</button>
        </div>
      </header>

      <section class="player-area" aria-label="プレーヤー領域">
        <div class="player-left">
          <video id="videoPlayer" controls preload="metadata" aria-label="ビデオプレーヤー"></video>

          <div class="player-controls" role="toolbar" aria-label="プレーヤーコントロール">
            <button id="prevBtn" class="small-btn" aria-label="前のトラック">◀◀</button>
            <button id="playPauseBtn" class="small-btn" aria-label="再生/一時停止">▶/Ⅱ</button>
            <button id="nextBtn" class="small-btn" aria-label="次のトラック">▶▶</button>

            <div id="shareSection" class="share-section">
              <button id="shareBtn" class="small-btn">プレイリストを共有</button>
              <div id="shareURL" class="share-url"></div>
            </div>

            <label for="speedSelect" class="visually-hidden">再生速度</label>
            <label class="speed-label">速度
              <select id="speedSelect" aria-label="再生速度">
                <option value="0.5">0.5x</option>
                <option value="0.75">0.75x</option>
                <option value="1" selected>1x</option>
                <option value="1.25">1.25x</option>
                <option value="1.5">1.5x</option>
                <option value="2">2x</option>
              </select>
            </label>

            <div class="total-duration" aria-live="polite">合計: <span id="totalDuration">00:00:00</span></div>
          </div>
        </div>

        <div class="playlist-right" aria-label="トラックリスト">
          <ul id="trackList" class="track-list" aria-label="トラック一覧"></ul>
        </div>
      </section>
    </main>
  </div>

  <div id="overlay" class="overlay"></div>

  <script src="https://cdn.jsdelivr.net/npm/lz-string@1.5.0/libs/lz-string.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
