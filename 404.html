<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>404 Not Found</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #121212;
      --text: #fff;
      --muted: #b3b3b3;
      --accent: #1db954;
      --button-bg: #1db954;
      --button-text: #000;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: "Segoe UI", Roboto, "Hiragino Kaku Gothic ProN", Meiryo, sans-serif;
    }

    body {
      display: grid;
      place-items: center;
      text-align: center;
      padding: 24px;
      box-sizing: border-box;
    }

    .box {
      max-width: 520px;
      width: 100%;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 3rem;
      line-height: 1;
    }

    p {
      margin: 0 0 10px;
      color: var(--muted);
      line-height: 1.6;
    }

    .btn {
      display: inline-block;
      margin-top: 16px;
      padding: 12px 18px;
      border: none;
      border-radius: 10px;
      background: var(--button-bg);
      color: var(--button-text);
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      font-size: 1rem;
    }

    .btn:hover {
      filter: brightness(1.05);
    }

    .btn:active {
      transform: translateY(1px);
    }

    .link {
      display: inline-block;
      margin-top: 14px;
      color: var(--accent);
      text-decoration: none;
      font-weight: 700;
    }

    .link:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>404 Not Found</h1>
    <p>ページが見つかりませんでした。</p>
    <p>ボタンを押すとホームに戻ります。共有リンクは index.html 側で読み込まれます。</p>

    <button id="homeBtn" class="btn" type="button">ホームへ戻る</button>
    <br />
    <a id="homeLink" class="link" href="./index.html">index.html を開く</a>
  </div>

  <script>
    (function () {
      function getBasePath() {
        const path = location.pathname.replace(/\/+$/, '');
        const host = location.hostname;

        if (host.endsWith('.github.io')) {
          const parts = path.split('/').filter(Boolean);
          if (parts.length >= 2) {
            return '/' + parts[0] + '/';
          }
        }

        return '/';
      }

      const basePath = getBasePath();
      const home = basePath + 'index.html';

      const homeLink = document.getElementById('homeLink');
      const homeBtn = document.getElementById('homeBtn');

      if (homeLink) homeLink.href = home;

      if (homeBtn) {
        homeBtn.addEventListener('click', () => {
          location.href = home;
        });
      }
    })();
  </script>

  <noscript>
    <p>JavaScript が無効です。</p>
    <p><a href="./index.html">ホームへ戻る</a></p>
  </noscript>
</body>
</html>
