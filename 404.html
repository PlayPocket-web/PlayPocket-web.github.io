<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Redirecting...</title>
</head>
<body>
  <p>読み込み中...</p>
  <p><a href="../index.html">ホームへ戻る</a></p>

  <script>
    (function () {
      try {
        sessionStorage.setItem('ppSharedRoute', location.pathname + location.search + location.hash);
      } catch (e) {}
      location.replace('../index.html');
    })();
  </script>

  <noscript>
    <p>JavaScript が無効です。</p>
  </noscript>
</body>
</html>
